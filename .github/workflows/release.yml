# Zoom Shell — 打 tag 后自动创建 GitHub Release 并上传源码包与校验和
# 使用方式：git tag -a v1.0.0 -m "release" && git push origin v1.0.0
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'

permissions:
  contents: write

jobs:
  release:
    name: Test, package, publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Run tests
        run: make test

      - name: Build demo
        run: make demo

      - name: Prepare release assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 去掉前缀 v，作为目录名版本号（如 v1.0.0 -> 1.0.0）
          VER="${TAG#v}"
          echo "VERSION=${VER}" >> "$GITHUB_ENV"
          git archive --prefix="zoom-shell-${VER}/" -o "zoom-shell-${VER}.tar.gz" HEAD
          git archive --format=zip --prefix="zoom-shell-${VER}/" -o "zoom-shell-${VER}.zip" HEAD
          cp build/zoom_shell_demo "zoom-shell-${VER}-demo-linux-x86_64"
          sha256sum \
            "zoom-shell-${VER}.tar.gz" \
            "zoom-shell-${VER}.zip" \
            "zoom-shell-${VER}-demo-linux-x86_64" \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            zoom-shell-${{ env.VERSION }}.tar.gz
            zoom-shell-${{ env.VERSION }}.zip
            zoom-shell-${{ env.VERSION }}-demo-linux-x86_64
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
